{% extends "admin/base.html" %}
{% block title %}Enquiries{% endblock %}
{% block content %}
<h1>Contact Enquiries</h1>
<table class="admin-table"><tr><th>Name</th><th>Email</th><th>Phone</th><th>Message</th><th>Date</th><th>Action</th></tr>
{% for e in enquiries %}<tr><td>{{ e.name }}</td><td>{{ e.email }}</td><td>{{ e.phone }}</td><td>{{ e.message }}</td><td>{{ e.created_at }}</td><td><form method="post" action="{{ url_for('admin_enquiry_delete', enquiry_id=e.id) }}" onsubmit="return confirm('Delete enquiry?')"><button>Delete</button></form></td></tr>{% endfor %}
</table>
{% endblock %}
