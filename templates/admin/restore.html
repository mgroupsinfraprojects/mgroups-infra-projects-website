{% extends "admin/base.html" %}
{% block title %}Restore Backup{% endblock %}
{% block content %}
<h1>Restore Backup</h1>
<section class="admin-panel"><p class="admin-note">Use this only with backup JSON generated by this website. For production, download a fresh backup before restoring.</p></section>
<form method="post" enctype="multipart/form-data" class="admin-form narrow">
    {{ csrf_field()|safe }}
    <label>Backup JSON<input type="file" name="backup_file" accept="application/json,.json" required></label>
    <label>Restore Mode<select name="mode"><option value="content_only">Settings + About only</option><option value="full_replace">Full replace services/projects/gallery</option></select></label>
    <button class="btn" type="submit">Restore Backup</button>
</form>
{% endblock %}
