{% extends "admin/base.html" %}
{% block title %}Gallery{% endblock %}
{% block content %}
<h1>Gallery</h1>
<form method="post" enctype="multipart/form-data" class="admin-form two-col admin-panel">
    <label>Title<input name="title" required></label>
    <label>Sort Order<input type="number" name="sort_order" value="0"></label>
    <label class="full">Caption<textarea name="caption" rows="3"></textarea></label>
    <label>Image<input type="file" name="image" accept="image/*" required></label>
    <div class="full"><button class="btn" type="submit">Add Image</button></div>
</form>
<div class="admin-card-grid">
{% for item in items %}<div class="mini-card"><img src="{{ url_for('static', filename=item.image_path) }}"><strong>{{ item.title }}</strong><form method="post" action="{{ url_for('admin_gallery_delete', item_id=item.id) }}" onsubmit="return confirm('Delete gallery image?')"><button>Delete</button></form></div>{% endfor %}
</div>
{% endblock %}
