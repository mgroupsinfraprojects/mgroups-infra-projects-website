{% extends "admin/base.html" %}
{% block title %}Reset Admin Password{% endblock %}
{% block content %}
<div class="login-card">
    <h1>Reset Password</h1>
    <p class="admin-note">This email-verified reset link is temporary. Set a strong password and do not reuse your email or GitHub password.</p>
    <form method="post" class="admin-form">
        {{ csrf_field()|safe }}
        <label>New Password<input name="new_password" type="password" minlength="10" autocomplete="new-password" required></label>
        <label>Confirm Password<input name="confirm_password" type="password" minlength="10" autocomplete="new-password" required></label>
        <button class="btn" type="submit">Reset Password</button>
    </form>
</div>
{% endblock %}
