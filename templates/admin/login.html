{% extends "admin/base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="login-card">
    <h1>Admin Login</h1>
    <p class="admin-note">Use the private owner credentials configured during deployment. No public default password is shown or shipped.</p>
    <form method="post" class="admin-form">
    {{ csrf_field()|safe }}
        <label>Username<input name="username" autocomplete="username" required></label>
        <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
        <button class="btn" type="submit">Login</button>
    </form>
    <p style="margin-top:16px"><a href="{{ url_for('admin_forgot_password') }}">Forgot password?</a></p>
</div>
{% endblock %}
