{% extends "admin/base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h1>Change Admin Password</h1>
<section class="admin-panel"><p class="admin-note">Use a unique password with at least 14 characters. Do not reuse Gmail, bank, college, or personal passwords.</p></section>
<form method="post" class="admin-form narrow">
    {{ csrf_field()|safe }}
    <label>Current Password<input type="password" name="current_password" autocomplete="current-password" required></label>
    <label>New Password<input type="password" name="new_password" autocomplete="new-password" minlength="10" required></label>
    <label>Confirm New Password<input type="password" name="confirm_password" autocomplete="new-password" minlength="10" required></label>
    <button class="btn" type="submit">Change Password</button>
</form>
{% endblock %}
