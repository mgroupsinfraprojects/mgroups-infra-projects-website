{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if project else 'Add' }} Project{% endblock %}
{% block content %}
<h1>{{ 'Edit' if project else 'Add' }} Project / Work</h1>
<form method="post" enctype="multipart/form-data" class="admin-form two-col">
    <label>Project Title<input name="title" value="{{ project.title if project else '' }}" required></label>
    <label>Location<input name="location" value="{{ project.location if project else '' }}"></label>
    <label>Category<input name="category" value="{{ project.category if project else '' }}"></label>
    <label>Status<select name="status"><option {% if project and project.status=='Ongoing' %}selected{% endif %}>Ongoing</option><option {% if project and project.status=='Completed' %}selected{% endif %}>Completed</option><option {% if project and project.status=='Upcoming' %}selected{% endif %}>Upcoming</option></select></label>
    <label>Year<input name="year" value="{{ project.year if project else '' }}"></label>
    <label>Main Image<input type="file" name="image" accept="image/*"></label>
    <label class="full">Description<textarea name="description" rows="8">{{ project.description if project else '' }}</textarea></label>
    <label class="check full"><input type="checkbox" name="is_featured" {% if project and project.is_featured %}checked{% endif %}> Featured on homepage</label>
    <div class="full"><button class="btn" type="submit">Save Project</button></div>
</form>
{% endblock %}
