{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if service else 'Add' }} Service{% endblock %}
{% block content %}
<h1>{{ 'Edit' if service else 'Add' }} Service</h1>
<form method="post" enctype="multipart/form-data" class="admin-form two-col">
    <label>Title<input name="title" value="{{ service.title if service else '' }}" required></label>
    <label>Icon Label<input name="icon" value="{{ service.icon if service else 'building' }}"></label>
    <label>Sort Order<input type="number" name="sort_order" value="{{ service.sort_order if service else 0 }}"></label>
    <label>Image<input type="file" name="image" accept="image/*"></label>
    <label class="full">Description<textarea name="description" rows="6" required>{{ service.description if service else '' }}</textarea></label>
    <label class="check full"><input type="checkbox" name="is_active" {% if not service or service.is_active %}checked{% endif %}> Active</label>
    <div class="full"><button class="btn" type="submit">Save Service</button></div>
</form>
{% endblock %}
