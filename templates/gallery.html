{% extends "base.html" %}
{% block title %}Gallery | {{ site.company_name }}{% endblock %}
{% block content %}
<section class="page-hero"><div class="container"><p class="eyebrow">Gallery</p><h1>Work Gallery</h1><p>Site photos, project images, and work updates.</p></div></section>
<section class="section soft"><div class="container"><div class="gallery-grid">
{% for item in items %}
<figure class="gallery-card"><img src="{{ url_for('static', filename=item.image_path) }}" alt="{{ item.title }}"><figcaption><strong>{{ item.title }}</strong><br>{{ item.caption }}</figcaption></figure>
{% else %}
<p>No gallery images added yet.</p>
{% endfor %}
</div></div></section>
{% endblock %}
